# A Deployment tells Kubernetes:
#   - What container image to run
#   - How many copies (replicas) to keep running
#   - How to restart them if they crash

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-k8s               # Name of this deployment
  namespace: default            # Which namespace to deploy into
spec:
  replicas: 2                   # Run 2 copies of the app (try changing this!)
  selector:
    matchLabels:
      app: hello-k8s            # This deployment manages pods with this label
  template:
    metadata:
      labels:
        app: hello-k8s          # Label applied to every pod this deployment creates
    spec:
      containers:
        - name: hello-k8s
          image: YOUR_DOCKERHUB_USERNAME/hello-k8s:latest   # <-- replace with your image
          ports:
            - containerPort: 3000   # Port the app listens on inside the container
          # Liveness probe: Kubernetes restarts the pod if this fails
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
